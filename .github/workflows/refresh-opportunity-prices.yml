name: Refresh Opportunity Prices
on:
  schedule:
    - cron: '30 7 * * *'  # 07:30 UTC daily (after earnings refresh)
  workflow_dispatch: {}

concurrency:
  group: refresh-opportunity-prices
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      # Zero npm dependencies (node: builtins + global fetch).
      - run: node scripts/fetch-opportunity-prices.mjs
      - run: git pull --rebase --autostash origin main
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'data: daily price / market cap / volume refresh'
          file_pattern: data/opportunities.json
