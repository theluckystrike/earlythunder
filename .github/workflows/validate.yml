name: Validate Data
on:
  pull_request:
    paths: ['data/**']
  push:
    paths: ['data/**']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python scripts/validate-data.py
