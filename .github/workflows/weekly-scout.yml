name: Weekly Scout Scan
on:
  schedule:
    - cron: '0 12 * * 1'  # Monday noon UTC
  workflow_dispatch: {}
jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python scripts/scout-scan.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'scout: weekly candidate scan'
          file_pattern: data/scout-candidates.json
