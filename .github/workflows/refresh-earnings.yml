name: Refresh Earnings Data
on:
  schedule:
    - cron: '0 7 * * *'  # 7 AM UTC daily (offset from daily-prices at 6 AM)
  workflow_dispatch: {}

# Never let two refreshes overlap (bounded execution).
concurrency:
  group: refresh-earnings
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      # Pipeline has zero npm dependencies (node: builtins + global fetch).
      - run: node scripts/fetch-earnings.mjs
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'data: daily earnings-yield refresh (DefiLlama)'
          file_pattern: public/earnings/index.html public/earnings/data.json
