name: Daily Price Update
on:
  schedule:
    - cron: '30 8 * * *'  # 08:30 UTC, after refresh-opportunity-prices (07:30)
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: daily-prices
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install requests yfinance
      - run: python scripts/update-prices.py
      - run: python scripts/validate-data.py
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'data: daily price update'
          file_pattern: data/opportunities.json
