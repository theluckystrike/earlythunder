name: Daily Price Update
on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch: {}
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests yfinance
      - run: python scripts/update-prices.py
      - run: python scripts/validate-data.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: daily price update'
          file_pattern: data/opportunities.json
